<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDV APC - Simulateur</title>

<!-- QR library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid #38bdf8;
}

header h1 {
    margin: 0;
    color: #38bdf8;
}

header p {
    margin: 5px;
    opacity: 0.8;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    overflow: hidden;
    border-radius: 10px;
}

th {
    background: #38bdf8;
    color: black;
    padding: 12px;
}

td {
    text-align: center;
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* CHECKBOX */
input[type="checkbox"] {
    transform: scale(1.4);
    cursor: pointer;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #16a34a;
    transform: scale(1.05);
}

/* RESULT */
#result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    padding: 15px;
    background: rgba(34,197,94,0.1);
    border-radius: 10px;
}

/* QR */
.qr {
    margin-top: 25px;
    text-align: center;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

/* INFO LINK */
.link-info {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
    word-break: break-all;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    th, td {
        padding: 8px;
        font-size: 14px;
    }
    
    button {
        width: 100%;
    }
    
    .container {
        padding: 10px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🧠 Simulateur Table de Vérité</h1>
    <p>Formateur APC - Aziz Mohamed Rostom</p>
</header>

<div class="container">

<div class="card">

<h2>📋 Exercice : ET / OU logique</h2>

<p>✅ Coche les cases selon la table de vérité :</p>

<table>
<thead>
<th>A</th>
<th>B</th>
<th>ET (A ∧ B)</th>
<th>OU (A ∨ B)</th>
</thead>
<tbody>
<tr>
<td>0</td>
<td>0</td>
<td><input type="checkbox" id="et1"></td>
<td><input type="checkbox" id="ou1"></td>
</tr>
<tr>
<td>0</td>
<td>1</td>
<td><input type="checkbox" id="et2"></td>
<td><input type="checkbox" id="ou2"></td>
</tr>
<tr>
<td>1</td>
<td>0</td>
<td><input type="checkbox" id="et3"></td>
<td><input type="checkbox" id="ou3"></td>
</tr>
<tr>
<td>1</td>
<td>1</td>
<td><input type="checkbox" id="et4"></td>
<td><input type="checkbox" id="ou4"></td>
</tr>
</tbody>
</table>

<button onclick="corriger()">✔ Vérifier mes réponses</button>

<div id="result"></div>

<div class="qr">
    <h3>📱 Scanner pour ouvrir sur mobile</h3>
    <div id="qrcode"></div>
    <div class="link-info" id="linkDisplay"></div>
</div>

</div>

</div>

<script>
// CORRECTION TABLE DE VÉRITÉ
function corriger() {

    let score = 0;
    let total = 8;

    let correct = {
        et1: false,   // 0 ET 0 = 0
        et2: false,   // 0 ET 1 = 0
        et3: false,   // 1 ET 0 = 0
        et4: true,    // 1 ET 1 = 1
        ou1: false,   // 0 OU 0 = 0
        ou2: true,    // 0 OU 1 = 1
        ou3: true,    // 1 OU 0 = 1
        ou4: true     // 1 OU 1 = 1
    };

    for(let id in correct){
        if(document.getElementById(id).checked === correct[id]){
            score++;
        }
    }

    let percent = Math.round((score/total)*100);

    let level = "";
    let message = "";

    if(percent < 50) {
        level = "🔴 Insuffisant";
        message = "Revoyez les règles de l'ET et du OU !";
    }
    else if(percent < 75) {
        level = "🟡 Moyen";
        message = "Encore quelques erreurs, vous pouvez mieux faire !";
    }
    else if(percent < 90) {
        level = "🟢 Bon";
        message = "Presque parfait ! Continuez comme ça !";
    }
    else {
        level = "🏆 Excellent";
        message = "Parfait ! Vous maîtrisez la table de vérité !";
    }

    document.getElementById("result").innerHTML = 
        `📊 Score : ${percent}% (${score}/${total})<br>🎯 ${level}<br>💡 ${message}`;
}

// RÉCUPÉRATION DE L'URL POUR LE QR CODE
function getGitHubUrl() {
    let currentUrl = window.location.href;
    
    // Si c'est une URL locale, suggère l'URL GitHub
    if(currentUrl.includes("localhost") || 
       currentUrl.includes("127.0.0.1") || 
       currentUrl.includes("file://")) {
        
        // À MODIFIER : Remplace par TON pseudo GitHub
        let githubUsername = "TON_PSEUDO_GITHUB";  // ← CHANGE ICI
        let repoName = "simulateur-tdv";
        
        return `https://${githubUsername}.github.io/${repoName}/`;
    }
    
    return currentUrl;
}

// AFFICHAGE DU QR CODE
let finalUrl = getGitHubUrl();

// Affiche l'URL sous le QR
document.getElementById("linkDisplay").innerHTML = `🌐 ${finalUrl}`;

// Génère le QR code
new QRCode(document.getElementById("qrcode"), {
    text: finalUrl,
    width: 180,
    height: 180,
    colorDark: "#38bdf8",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
});

// AJOUT d'un message d'aide si l'URL n'est pas modifiée
if(finalUrl.includes("TON_PSEUDO_GITHUB")) {
    document.getElementById("linkDisplay").innerHTML += 
        "<br>⚠️ Remplace 'TON_PSEUDO_GITHUB' par ton pseudo GitHub dans le code !";
}

// Réinitialisation facile (optionnelle)
function reinitialiser() {
    let allBoxes = document.querySelectorAll('input[type="checkbox"]');
    allBoxes.forEach(box => box.checked = false);
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
