<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDV APC - Simulateur</title>

<!-- QR library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    color: white;
    min-height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 3px solid #38bdf8;
}

header h1 {
    margin: 0;
    color: #38bdf8;
    font-size: 1.8rem;
}

header p {
    margin: 8px 0 0;
    opacity: 0.8;
    font-size: 0.95rem;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 25px 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
}

.card h2 {
    margin-bottom: 15px;
    color: #38bdf8;
    font-size: 1.5rem;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 20px;
    font-size: 0.9rem;
}

/* TABLE */
.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    border-radius: 12px;
    overflow: hidden;
}

th {
    background: #38bdf8;
    color: #0f172a;
    padding: 14px 10px;
    font-weight: bold;
    font-size: 1rem;
}

td {
    text-align: center;
    padding: 12px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.2);
}

tr:last-child td {
    border-bottom: none;
}

/* CHECKBOX */
input[type="checkbox"] {
    width: 22px;
    height: 22px;
    transform: scale(1);
    cursor: pointer;
    accent-color: #38bdf8;
}

/* BUTTONS */
.button-group {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
}

button {
    padding: 12px 24px;
    border: none;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
}

.btn-verifier {
    background: #22c55e;
    color: white;
}

.btn-verifier:hover {
    background: #16a34a;
    transform: translateY(-2px);
}

.btn-reset {
    background: #ef4444;
    color: white;
}

.btn-reset:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

/* RESULT */
#result {
    margin-top: 20px;
    font-size: 1.1rem;
    font-weight: bold;
    text-align: center;
    padding: 18px;
    background: rgba(34,197,94,0.1);
    border-radius: 12px;
    border-left: 4px solid #22c55e;
}

/* QR SECTION */
.qr {
    margin-top: 30px;
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

.qr h3 {
    margin-bottom: 15px;
    color: #38bdf8;
}

#qrcode {
    display: flex;
    justify-content: center;
    margin: 15px 0;
}

.link-info {
    margin-top: 12px;
    font-size: 12px;
    opacity: 0.8;
    word-break: break-all;
    background: rgba(0,0,0,0.3);
    padding: 8px 12px;
    border-radius: 8px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 0.8rem;
    opacity: 0.6;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    header h1 {
        font-size: 1.3rem;
    }
    
    th, td {
        padding: 10px 6px;
        font-size: 13px;
    }
    
    .card {
        padding: 18px;
    }
    
    button {
        flex: 1;
        padding: 10px 16px;
    }
    
    .button-group {
        gap: 10px;
    }
    
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🧠 Simulateur Table de Vérité</h1>
    <p>Formateur APC - Aziz Mohamed Rostom</p>
</header>

<div class="container">
    <div class="card">
        <h2>📋 Exercice : ET / OU logique</h2>
        <div class="subtitle">✅ Coche les cases selon la table de vérité ci-dessous :</div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>A</th>
                        <th>B</th>
                        <th>ET (A ∧ B)</th>
                        <th>OU (A ∨ B)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>0</td>
                        <td>0</td>
                        <td><input type="checkbox" id="et1"></td>
                        <td><input type="checkbox" id="ou1"></td>
                    </tr>
                    <tr>
                        <td>0</td>
                        <td>1</td>
                        <td><input type="checkbox" id="et2"></td>
                        <td><input type="checkbox" id="ou2"></td>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>0</td>
                        <td><input type="checkbox" id="et3"></td>
                        <td><input type="checkbox" id="ou3"></td>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>1</td>
                        <td><input type="checkbox" id="et4"></td>
                        <td><input type="checkbox" id="ou4"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="button-group">
            <button class="btn-verifier" onclick="corriger()">✔ Vérifier mes réponses</button>
            <button class="btn-reset" onclick="reinitialiser()">🔄 Tout effacer</button>
        </div>

        <div id="result"></div>

        <div class="qr">
            <h3>📱 Scanner pour ouvrir sur mobile</h3>
            <div id="qrcode"></div>
            <div class="link-info" id="linkDisplay"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2024 - Simulateur de Table de Vérité | ET / OU Logique</p>
</footer>

<script>
// ============================================
// CORRECTION DE LA TABLE DE VÉRITÉ
// ============================================
function corriger() {
    let score = 0;
    let total = 8;

    // Les bonnes réponses :
    // ET : 1 seulement quand A=1 ET B=1
    // OU : 1 quand A=1 OU B=1 (ou les deux)
    let correct = {
        et1: false,   // 0 ET 0 = 0 (faux)
        et2: false,   // 0 ET 1 = 0 (faux)
        et3: false,   // 1 ET 0 = 0 (faux)
        et4: true,    // 1 ET 1 = 1 (vrai)
        ou1: false,   // 0 OU 0 = 0 (faux)
        ou2: true,    // 0 OU 1 = 1 (vrai)
        ou3: true,    // 1 OU 0 = 1 (vrai)
        ou4: true     // 1 OU 1 = 1 (vrai)
    };

    // Vérification de chaque case
    for(let id in correct){
        let checkbox = document.getElementById(id);
        if(checkbox && checkbox.checked === correct[id]){
            score++;
        }
    }

    let percent = Math.round((score / total) * 100);
    
    let level = "";
    let message = "";
    let emoji = "";

    if(percent < 50) {
        emoji = "🔴";
        level = "Insuffisant";
        message = "Revoyez les règles de l'ET et du OU !";
    }
    else if(percent < 75) {
        emoji = "🟡";
        level = "Moyen";
        message = "Encore quelques erreurs, vous pouvez mieux faire !";
    }
    else if(percent < 90) {
        emoji = "🟢";
        level = "Bon";
        message = "Presque parfait ! Continuez comme ça !";
    }
    else if(percent < 100) {
        emoji = "🎯";
        level = "Très Bien";
        message = "Plus qu'une petite erreur !";
    }
    else {
        emoji = "🏆";
        level = "Excellent";
        message = "Parfait ! Vous maîtrisez la table de vérité !";
    }

    document.getElementById("result").innerHTML = 
        `📊 Score : ${percent}% (${score}/${total})<br>` +
        `${emoji} Niveau : ${level}<br>` +
        `💡 ${message}`;
    
    // Animation du résultat
    let resultDiv = document.getElementById("result");
    resultDiv.style.transform = "scale(1.02)";
    setTimeout(() => {
        resultDiv.style.transform = "scale(1)";
    }, 300);
}

// ============================================
// RÉINITIALISATION
// ============================================
function reinitialiser() {
    let allBoxes = document.querySelectorAll('input[type="checkbox"]');
    allBoxes.forEach(box => {
        box.checked = false;
    });
    document.getElementById("result").innerHTML = "";
}

// ============================================
// GESTION DU QR CODE (CORRIGÉ AVEC TON PSEUDO)
// ============================================
// TON PSEUDO GITHUB : Rostomaziz22
const GITHUB_USERNAME = "Rostomaziz22";
const REPO_NAME = "tdv-apc";

function getGitHubUrl() {
    let currentUrl = window.location.href;
    
    // Si c'est une URL locale ou de développement
    if(currentUrl.includes("localhost") || 
       currentUrl.includes("127.0.0.1") || 
       currentUrl.includes("file://") ||
       currentUrl.includes(":5500") ||
       currentUrl.includes(":8000")) {
        
        // URL GitHub Pages
        return `https://${GITHUB_USERNAME}.github.io/${REPO_NAME}/`;
    }
    
    return currentUrl;
}

// ATTENDRE QUE LA PAGE SOIT CHARGÉE POUR GÉNÉRER LE QR CODE
document.addEventListener("DOMContentLoaded", function() {
    let finalUrl = getGitHubUrl();
    
    // Affiche l'URL sous le QR
    let linkDisplay = document.getElementById("linkDisplay");
    linkDisplay.innerHTML = `🌐 ${finalUrl}<br>📱 Scannez ce code avec votre téléphone`;
    
    // Supprime l'ancien QR s'il existe
    let qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";
    
    // Génère le nouveau QR code
    try {
        new QRCode(qrContainer, {
            text: finalUrl,
            width: 180,
            height: 180,
            colorDark: "#38bdf8",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    } catch(e) {
        console.log("Erreur QR Code:", e);
        qrContainer.innerHTML = "<p style='color:red'>❌ Erreur génération QR</p>";
    }
    
    // Message de bienvenue
    console.log("✅ Simulateur TDV chargé !");
    console.log("📱 URL pour mobile :", finalUrl);
});
</script>

</body>
</html>
